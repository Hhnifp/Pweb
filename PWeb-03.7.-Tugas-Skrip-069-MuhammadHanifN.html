<body>
    <p>
        (x<sub>1</sub> + x<sub>2</sub>)<sup>2</sup> =
        x<sub>1</sub><sup>2</sup> + x<sub>2</sub><sup>2</sup> +
        2x<sub>1</sub>x<sub>2</sub>
    </p>

    <p>
        2H<sub>2</sub> + O<sub>2</sub> = 2H<sub>2</sub>O
    </p>

    <p>
        Contoh lain dalam matematika: a<sup>2</sup> + b<sup>2</sup> = c<sup>2</sup>
        (rumus Pythagoras).
    </p>

    <p>
        Dalam ilmu kimia, senyawa seperti CO<sub>2</sub> adalah karbon dioksida,
        dan H<sub>2</sub>SO<sub>4</sub> adalah asam sulfat.
    </p>

    <p>
        Contoh satuan: kecepatan cahaya sekitar 3 x 10<sup>8</sup> m/s.
    </p>
</body>

</html>
