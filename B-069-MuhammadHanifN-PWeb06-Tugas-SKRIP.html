<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 6 - Box Layout CSS 3 Kolom 2 Baris</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 15px;
            background-color: #f1f1f1;
        }
        header {
            background-color: #333;
            padding: 30px;
            text-align: center;
            font-size: 24px;
            color: white;
            margin-bottom: 15px;
        }
        .row {
            margin-bottom: 15px;
        }     
        .row::after {
            content: "";
            display: table;
            clear: both;
        }
        .column {
            float: left;
            width: 33.33%; 
            padding: 40px 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            border: 2px solid #fff; 
        }
        .bg-1 { background-color: #aaa; }
        .bg-2 { background-color: #bbb; }
        .bg-3 { background-color: #ccc; }
        .bg-4 { background-color: #ddd; }
        .bg-5 { background-color: #eee; }
        .bg-6 { background-color: #999; }
        footer {
            background-color: #333;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .column {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <h2>BOX LAYOUT - HEADER</h2>
    </header>

    <div class="row">
        <div class="column bg-1">Baris 1 - Kolom 1</div>
        <div class="column bg-2">Baris 1 - Kolom 2</div>
        <div class="column bg-3">Baris 1 - Kolom 3</div>
    </div>

    <div class="row">
        <div class="column bg-4">Baris 2 - Kolom 1</div>
        <div class="column bg-5">Baris 2 - Kolom 2</div>
        <div class="column bg-6">Baris 2 - Kolom 3</div>
    </div>

    <footer>
        <p>BOX LAYOUT - FOOTER (Muhammad Hanif Novanto - NIM 069)</p>
    </footer>

</body>
</html>
